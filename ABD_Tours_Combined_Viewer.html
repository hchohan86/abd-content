<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ABD Tours — 30 Carousels + 30 Static Posts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Poppins:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#070604;font-family:'Poppins',sans-serif;min-height:100vh;}
#idx{padding:44px 32px 64px;}
.idx-hd{text-align:center;margin-bottom:40px;}
.idx-hd h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#F5F0E8;}
.idx-hd h1 em{font-style:italic;color:#B8952A;}
.idx-hd p{font-family:'Roboto Mono',monospace;font-size:10px;color:#4A3F2A;margin-top:8px;letter-spacing:.15em;}
.gold-bar{width:60px;height:2px;background:#B8952A;margin:14px auto 0;}
.sec-label{font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#B8952A;max-width:1260px;margin:40px auto 16px;padding:0 4px;display:flex;align-items:center;gap:14px;}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(184,149,42,.2);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-width:1260px;margin:0 auto;}
.card{background:#0D0B08;border:1px solid rgba(184,149,42,.12);cursor:pointer;transition:all .18s;position:relative;overflow:hidden;border-radius:2px;}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:#B8952A;transform:scaleY(0);transform-origin:top;transition:transform .2s;z-index:2;}
.card:hover::before{transform:scaleY(1);}
.card:hover{border-color:rgba(184,149,42,.45);transform:translateY(-2px);}
.card-thumb{width:100%;height:115px;background-size:cover;background-position:center;position:relative;}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.65));}
.card-body{padding:12px 14px 14px;}
.c-day{font-family:'Roboto Mono',monospace;font-size:9px;color:#3A2E18;margin-bottom:5px;letter-spacing:.15em;}
.c-hl{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#F5F0E8;line-height:1.35;margin-bottom:4px;}
.c-sub{font-size:10px;color:#4A3F2A;line-height:1.4;}
#vwr,#svwr{display:none;flex-direction:column;align-items:center;padding:28px 20px 56px;min-height:100vh;}
.vtop{display:flex;align-items:center;gap:10px;margin-bottom:20px;width:540px;max-width:calc(100vw - 40px);flex-wrap:wrap;}
.bbk{font-family:'Roboto Mono',monospace;font-size:9px;color:#4A3F2A;cursor:pointer;background:none;border:1px solid rgba(184,149,42,.2);padding:7px 14px;letter-spacing:.1em;transition:all .15s;}
.bbk:hover{color:#F5F0E8;border-color:rgba(184,149,42,.6);}
.vday{font-family:'Roboto Mono',monospace;font-size:9px;color:#3A2E18;letter-spacing:.12em;}
.vtit{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#B8952A;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ptog{display:flex;gap:5px;margin-left:auto;}
.ptb{font-family:'Roboto Mono',monospace;font-size:9px;padding:6px 11px;cursor:pointer;border:1px solid rgba(184,149,42,.15);background:none;color:#4A3F2A;letter-spacing:.08em;transition:all .15s;}
.ptb:hover{color:#B8952A;border-color:rgba(184,149,42,.4);}
.ptb.on{background:rgba(184,149,42,.1);color:#F5F0E8;border-color:rgba(184,149,42,.5);}
.sw{position:relative;width:540px;height:540px;max-width:calc(100vw - 40px);}
.sw{aspect-ratio:1;}
@media(max-width:580px){.sw{width:calc(100vw - 40px);height:calc(100vw - 40px);}}
.slide{display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;flex-direction:column;}
.slide.on{display:flex;}
.dk{background:#0A0A0A;}.dk .tp{color:#F5F0E8;}.dk .ts{color:#C4B49A;}.dk .tm{color:#5A4E38;}.dk .tg{color:#D4AF4F;}
.dk .bgn{color:#F5F0E8;opacity:.03;}.dk .gl{background:#B8952A;}
.lt{background:#F5F0E8;}.lt .tp{color:#0A0A0A;}.lt .ts{color:#3D3020;}.lt .tm{color:#8A7A60;}.lt .tg{color:#8A6210;}
.lt .bgn{color:#0A0A0A;opacity:.04;}.lt .gl{background:#B8952A;}
.s-cover{padding:32px;justify-content:space-between;background-size:cover!important;background-position:center!important;}
.cvgrid{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.cvov{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,.48) 0%,rgba(0,0,0,.68) 45%,rgba(0,0,0,.9) 100%);z-index:2;pointer-events:none;}
.cvbrand{font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#D4AF4F;position:relative;z-index:3;}
.cvmid{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:3;padding:4px 0;}
.cvi{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;line-height:.93;letter-spacing:-.02em;color:#F5F0E8;}
.cvb{font-family:'Poppins',sans-serif;font-weight:900;line-height:.88;letter-spacing:-.02em;text-transform:uppercase;margin-top:8px;color:#D4AF4F;}
.cvstripe{height:3px;background:#B8952A;width:70px;margin:14px 0 10px;}
.cvtag{font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:#C4B49A;}
.cvbot{display:flex;justify-content:flex-end;align-items:flex-end;position:relative;z-index:3;}
.cvnum{position:absolute;font-family:'Poppins',sans-serif;font-weight:900;font-size:200px;right:-15px;bottom:-45px;pointer-events:none;z-index:1;line-height:1;letter-spacing:-.05em;color:#F5F0E8;opacity:.03;}
.s-int{padding:44px;justify-content:center;position:relative;}
.isn{position:absolute;top:18px;right:24px;font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.12em;z-index:3;opacity:.4;}
.ibh{position:absolute;bottom:20px;left:32px;font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.12em;z-index:3;color:rgba(184,149,42,.35);}
.ilbl{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;opacity:.5;margin-bottom:14px;display:block;}
.ibody{font-family:'Poppins',sans-serif;font-size:15px;line-height:1.7;position:relative;z-index:2;}
.ibgn{position:absolute;font-family:'Poppins',sans-serif;font-weight:900;font-size:155px;right:-8px;bottom:-18px;pointer-events:none;z-index:1;line-height:1;letter-spacing:-.05em;}
.ibar{width:40px;height:3px;margin-bottom:18px;position:relative;z-index:2;background:#B8952A;}
.ihead{font-family:'Poppins',sans-serif;font-weight:800;line-height:1.2;position:relative;z-index:2;margin-bottom:14px;letter-spacing:-.01em;}
.iprin{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:24px;line-height:1.42;position:relative;z-index:2;}
.s-close{padding:40px 44px;justify-content:center;position:relative;}
.icrn{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.iclbl{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;display:block;position:relative;z-index:2;opacity:.45;}
.ichl{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:26px;line-height:1.3;position:relative;z-index:2;margin-bottom:22px;}
.icgold{height:3px;width:50px;margin-bottom:20px;position:relative;z-index:2;background:#B8952A;}
.icphone{font-family:'Roboto Mono',monospace;font-weight:700;font-size:22px;letter-spacing:.03em;position:relative;z-index:2;display:block;margin-bottom:5px;color:#B8952A;}
.icweb{font-family:'Roboto Mono',monospace;font-size:13px;letter-spacing:.06em;position:relative;z-index:2;display:block;margin-bottom:14px;}
.iccta{font-size:13px;position:relative;z-index:2;line-height:1.5;}
.icbrand{position:absolute;bottom:24px;right:32px;font-family:'Playfair Display',serif;font-style:italic;font-size:13px;font-weight:700;z-index:2;color:#B8952A;}
.ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:14px;width:540px;max-width:calc(100vw - 40px);}
.cbtn{font-family:'Roboto Mono',monospace;font-size:9px;cursor:pointer;background:none;border:1px solid rgba(184,149,42,.18);padding:8px 18px;color:#4A3F2A;letter-spacing:.1em;transition:all .15s;}
.cbtn:hover:not(:disabled){border-color:rgba(184,149,42,.5);color:#B8952A;}
.cbtn:disabled{opacity:.2;cursor:default;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:#1E1A12;cursor:pointer;transition:all .15s;}
.dot.on{background:#B8952A;width:18px;border-radius:2px;}
.cnav{display:flex;gap:10px;margin-top:14px;align-items:center;font-family:'Roboto Mono',monospace;font-size:9px;color:#3A2E18;letter-spacing:.1em;width:540px;max-width:calc(100vw - 40px);}
.cnbtn{cursor:pointer;border:1px solid rgba(184,149,42,.15);padding:6px 14px;background:none;color:#4A3F2A;font-family:'Roboto Mono',monospace;font-size:9px;transition:all .15s;letter-spacing:.1em;}
.cnbtn:hover{color:#B8952A;border-color:rgba(184,149,42,.4);}
.cnbtn:disabled{opacity:.2;cursor:default;}
.cappnl{width:540px;max-width:calc(100vw - 40px);margin-top:22px;background:#0D0B08;border:1px solid rgba(184,149,42,.12);padding:20px 22px;}
.caplbl{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#3A2E18;margin-bottom:10px;display:block;}
.captxt{font-family:'Poppins',sans-serif;font-size:12px;line-height:1.8;color:#8A7A60;white-space:pre-wrap;word-break:break-word;}
.capact{display:flex;gap:8px;margin-top:12px;align-items:center;}
.capcpy{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.12em;padding:8px 18px;background:none;border:1px solid rgba(184,149,42,.3);color:#B8952A;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.capcpy:hover{border-color:#B8952A;color:#F5F0E8;}
.capok{font-family:'Roboto Mono',monospace;font-size:9px;color:#4A3F2A;letter-spacing:.1em;opacity:0;transition:opacity .3s;}
.capok.show{opacity:1;}
.imgtb{width:540px;max-width:calc(100vw - 40px);display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.imgbtn{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.1em;padding:9px 16px;background:none;border:1px solid rgba(184,149,42,.2);color:#B8952A;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.imgbtn:hover{border-color:#B8952A;color:#F5F0E8;}
.imgbtn:disabled{opacity:.25;cursor:default;}
.imgfb{font-family:'Roboto Mono',monospace;font-size:9px;color:#4A3F2A;letter-spacing:.1em;opacity:0;transition:opacity .3s;}
.imgfb.show{opacity:1;}
.imgfn{font-family:'Roboto Mono',monospace;font-size:9px;color:#2A2218;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
.spost{display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;}
.spost.on{display:block;}
</style>
</head>
<body>
<div id="idx">
  <div class="idx-hd">
    <h1>Adventure <em>Tours</em></h1>
    <p>30 CAROUSELS + 30 STATIC POSTS &nbsp;&middot;&nbsp; ABDTOURS.COM</p>
    <div class="gold-bar"></div>
  </div>
  <div class="sec-label">30 Carousels</div>
  <div class="grid" id="cgrid"></div>
  <div class="sec-label" style="margin-top:48px;">30 Static Posts</div>
  <div class="grid" id="sgrid"></div>
</div>
<div id="vwr">
  <div class="vtop">
    <button class="bbk" onclick="showIdx()">&larr; All Posts</button>
    <span class="vday" id="vday"></span>
    <span class="vtit" id="vtit"></span>
    <div class="ptog">
      <button class="ptb" id="pdk" onclick="setPal('dk')">DARK</button>
      <button class="ptb" id="plt" onclick="setPal('lt')">LIGHT</button>
    </div>
  </div>
  <div class="sw" id="sw"></div>
  <div class="imgtb">
    <button class="imgbtn" id="bci" onclick="copyImg()">&#9638; Copy Image</button>
    <button class="imgbtn" id="bdl" onclick="dlImg()">&#8595; Download</button>
    <span class="imgfb" id="imgfb"></span>
    <span class="imgfn" id="imgfn"></span>
  </div>
  <div class="ctrl">
    <button class="cbtn" id="bp" onclick="prevS()">&larr; Prev</button>
    <div class="dots" id="dots"></div>
    <button class="cbtn" id="bn" onclick="nextS()">Next &rarr;</button>
  </div>
  <div class="cnav">
    <button class="cnbtn" id="cpb" onclick="prevC()">&larr; Prev Carousel</button>
    <span id="cct" style="flex:1;text-align:center;"></span>
    <button class="cnbtn" id="cnb" onclick="nextC()">Next Carousel &rarr;</button>
  </div>
  <div class="cappnl">
    <span class="caplbl">Instagram Caption</span>
    <div class="captxt" id="captxt"></div>
    <div class="capact"><button class="capcpy" onclick="copyCap()">Copy Caption</button><span class="capok" id="capok">&#10003; Copied</span></div>
  </div>
</div>
<div id="svwr">
  <div class="vtop">
    <button class="bbk" onclick="showIdx()">&larr; All Posts</button>
    <span class="vday" id="svday"></span>
    <span class="vtit" id="svtit"></span>
  </div>
  <div class="sw" id="sw2"></div>
  <div class="imgtb">
    <button class="imgbtn" id="sbci" onclick="copySI()">&#9638; Copy Image</button>
    <button class="imgbtn" id="sbdl" onclick="dlSI()">&#8595; Download</button>
    <span class="imgfb" id="simgfb"></span>
    <span class="imgfn" id="simgfn"></span>
  </div>
  <div class="ctrl">
    <button class="cbtn" id="sbp" onclick="prevSP()">&larr; Prev</button>
    <div class="dots" id="sdots"></div>
    <button class="cbtn" id="sbn" onclick="nextSP()">Next &rarr;</button>
  </div>
  <div class="cappnl">
    <span class="caplbl">Instagram Caption</span>
    <div class="captxt" id="scaptxt"></div>
    <div class="capact"><button class="capcpy" onclick="copyScap()">Copy Caption</button><span class="capok" id="scapok">&#10003; Copied</span></div>
  </div>
</div>

var D=[{"day": 1, "def": "dk", "i": "Spring Travel", "b": "IS OPEN.", "t": "School groups, senior clubs & corporate teams.", "sl": [{"k": "ctx", "l": "THE SITUATION", "b": "Group spots fill up fast in spring. Whether you're a school coordinator, a senior group organizer, or a corporate event planner \u2014 the earlier you book, the better your options."}, {"k": "pt", "n": "01", "h": "WE SERVE THE FULL DMV + EAST COAST", "b": "From Prince George's County to Philadelphia and New York City \u2014 our coaches go where your group needs to be."}, {"k": "pt", "n": "02", "h": "COACHES FROM 14 TO 56 PASSENGERS", "b": "Ford Transit for small teams. Van Hool Mini Coach for mid-size groups. MCI full coaches for schools and large clubs."}, {"k": "ta", "p": "Book early. Spring fills up fast.", "g": "SPRING"}, {"k": "cl", "h": "Get a free quote in 24 hours.", "c": "Spring slots are going. Call or visit us today."}], "cap": "Spring travel season is officially open \u2014 and group spots are going fast.\n\nWhether you're a school coordinator planning a DC field trip, a senior group looking for a comfortable day out, or a company that needs reliable shuttle service \u2014 this is the season to book early.\n\nDOD-certified. Real fleet. Real reliability.\n\nDrop your group size in the comments or visit abdtours.com for a free quote.\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #SchoolTrip #SpringTrip #WashingtonDC #DMV #MotorCoach #BusRental"}, {"day": 2, "def": "lt", "i": "What Size Bus", "b": "DOES YOUR GROUP NEED?", "t": "A quick guide to getting the right coach.", "sl": [{"k": "ctx", "l": "THE SITUATION", "b": "Choosing the wrong size is the most common mistake groups make. It either costs extra money or leaves your group uncomfortable. Here's how to get it right."}, {"k": "pt", "n": "01", "h": "14\u201335 PASSENGERS", "b": "Ford Transit (14), Limo Mini-Bus (20\u201325), or Van Hool Mini Coach (25\u201335). Ideal for corporate teams, senior day trips, community outings, and smaller church groups."}, {"k": "pt", "n": "02", "h": "36\u201356 PASSENGERS", "b": "Full-size MCI coaches for school groups, sports teams, and large organizations. Restroom, PA system, overhead storage, and reclining seats included."}, {"k": "ta", "p": "Always book the size that fits \u2014 not the cheapest one available.", "g": "SIZE"}, {"k": "cl", "h": "Not sure which bus fits? Call us.", "c": "We'll match your group to the right coach in minutes."}], "cap": "Booking a bus and not sure what size you need? Here's the quick guide.\n\nChoosing the wrong size is the most common mistake groups make.\n\nSwipe through to find your fit, then reach out and we'll confirm the right option for your specific trip.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #BusRental #MotorCoach #WashingtonDC #DMV"}, {"day": 3, "def": "dk", "i": "Bus 903", "b": "LOADED & READY.", "t": "Another school group hits the road today.", "sl": [{"k": "ctx", "l": "TODAY'S ROUTE", "b": "Prince George's County to Washington DC. Students, chaperones, packed lunches \u2014 and a driver who knows every landmark on the Mall."}, {"k": "pt", "n": "01", "h": "PRE-TRIP PREP EVERY TIME", "b": "Interior cleaned. Exterior washed. Mechanical systems checked. Fuel topped off. This happens before every single trip \u2014 not just the big ones."}, {"k": "pt", "n": "02", "h": "SERVING PG COUNTY SCHOOLS FOR YEARS", "b": "Getting a student to the Capitol for the first time \u2014 that's the work. And it never gets old."}, {"k": "ta", "p": "Every trip starts the night before.", "g": "903"}, {"k": "cl", "h": "Tag a teacher who makes field trips happen.", "c": "abdtours.com | 301-868-1141"}], "cap": "Bus 903 is gassed up, cleaned, and ready to roll.\n\nThere's something special about a school trip morning. The energy. The excitement. Kids seeing the Capitol for the first time \u2014 that never gets old.\n\nWe're proud to serve the schools in Prince George's County and across the DMV.\n\nTag a teacher who makes field trips happen for their students.\n\n#AdventureTours #ABDTours #SchoolTrip #FieldTrip #WashingtonDC #Maryland #DMV #CharterBus"}, {"day": 4, "def": "dk", "i": "Every great field trip", "b": "STARTS WITH A BUS.", "t": "And a driver who knows the route by heart.", "sl": [{"k": "ctx", "l": "THE MOMENT", "b": "First Capitol visit. First NYC skyline. First class trip away from home. These are the moments students remember long after they've forgotten the textbook."}, {"k": "pt", "n": "01", "h": "WE'VE BEEN PART OF THOUSANDS", "b": "School groups, senior clubs, families \u2014 all heading somewhere that matters to them. The bus is just the beginning of the story."}, {"k": "pt", "n": "02", "h": "HISTORY BECOMES REAL IN PERSON", "b": "No classroom lesson replaces the National Mall. Civics makes sense when you're at the Capitol. That's what we make possible."}, {"k": "ta", "p": "Group travel creates memories people carry for life.", "g": "TRIPS"}, {"k": "cl", "h": "What was your most memorable school trip?", "c": "Tell us below  |  abdtours.com"}], "cap": "The first time you see the Washington Monument from the window of a bus \u2014 that's a feeling that stays with you.\n\nWe've been part of thousands of those moments.\n\nGroup travel isn't just about getting from A to B. It's about the experience in between.\n\nWhat was your most memorable school trip?\n\n#AdventureTours #ABDTours #CharterBus #SchoolTrip #FieldTrip #WashingtonDC #GroupTravel #DMV"}, {"day": 5, "def": "lt", "i": "Charter Bus vs.", "b": "RENTING VANS.", "t": "The real cost breakdown.", "sl": [{"k": "ctx", "l": "THE SCENARIO", "b": "40 people. DC to Philadelphia. Most groups assume renting vans is the budget option. After doing the math \u2014 it usually isn't. Here's why."}, {"k": "pt", "n": "01", "h": "THE VAN MATH (WHAT GROUPS MISS)", "b": "6\u20137 passenger vans + fuel + insurance + 3\u20134 drivers needed. Plus: split group experience and coordination stress. Hidden costs add up fast."}, {"k": "pt", "n": "02", "h": "THE CHARTER MATH (ONE FLAT RATE)", "b": "One coach. One professional driver. Everyone together. No fuel to buy. No separate insurance. Per-head cost almost always lower than the van option."}, {"k": "ta", "p": "The easiest decision is the one that puts everyone on the same bus.", "g": "MATH"}, {"k": "cl", "h": "Run the numbers with us.", "c": "We'll give you a free quote so you can compare directly."}], "cap": "Most groups think renting vans is the budget option. After doing the math \u2014 it usually isn't.\n\nWhen you split a 40-person group across 7 vans, you're paying for: multiple rentals, fuel, insurance, and multiple drivers.\n\nOne charter coach keeps everyone together, costs less per head, and comes with a professional driver.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #BusRental #MotorCoach"}, {"day": 6, "def": "dk", "i": "Tag someone", "b": "WHO NEEDS A GROUP TRIP.", "t": "You know who it is.", "sl": [{"k": "ctx", "l": "THE SITUATION", "b": "There's always that one person in the group who keeps saying 'we should do a trip' but never actually books it. This post is for them."}, {"k": "pt", "n": "01", "h": "CHURCH GROUP. SENIOR CLUB. STAFF RETREAT.", "b": "Atlantic City casino run. NYC day trip. DC monuments. Fall foliage tour. We've done all of them \u2014 and the group always asks when the next one is."}, {"k": "pt", "n": "02", "h": "45 SEATS. ONE COACH. ZERO HEADACHES.", "b": "No splitting up. No Uber coordination. No one getting lost. Just one call and a date on the calendar."}, {"k": "ta", "p": "Don't let another season pass without the trip.", "g": "GO"}, {"k": "cl", "h": "Drop their name below", "c": "We'll handle the rest.  |  301-868-1141"}], "cap": "There's always that one person in the group who keeps saying 'we should do a trip' but never actually books it.\n\nTag them.\n\nWhether it's a church group heading to Atlantic City, a senior club planning a NYC d ple comfortable and on time.\n\nOur drivers are professional, experienced, and genuinely good at what they do. That's not an accident.\n\nTag or shout out a driver who made a trip special.\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #MotorCoach #WashingtonDC #DMV"}, {"day": 10, "def": "lt", "i": "The moment", "b": "THE SKYLINE APPEARS.", "t": "That's when the whole bus goes quiet.", "sl": [{"k": "ctx", "l": "THE MOMENT", "b": "It happens on the highway, usually. The city skyline comes into view \u2014 and for just a second, everyone stops talking. DC. Philadelphia. Manhattan. Every time."}, {"k": "pt", "n": "01", "h": "SHARED MOMENTS YOU CAN'T PLAN FOR", "b": "The Washington Monument at sunrise. Philly's skyline over the bridge. Manhattan coming into view. We've seen it happen thousands of times."}, {"k": "pt", "n": "02", "h": "IT NEVER GETS OLD FOR US EITHER", "b": "After thousands of trips, the driver still points it out. That's not routine \u2014 that's pride in the work."}, {"k": "ta", "p": "Group travel isn't about distance. It's about arrival.", "g": "VIEW"}, {"k": "cl", "h": "Which city skyline hit you hardest?", "c": "Tell us below  |  abdtours.com"}], "cap": "There's that specific moment \u2014 usually somewhere on the highway \u2014 when the city skyline appears.\n\nAnd the whole bus goes quiet for just a second.\n\nWashington Monument at sunrise. Philly's skyline over the bridge. Manhattan coming into view.\n\nWhich city skyline hit you hardest the first time?\n\n#AdventureTours #ABDTours #GroupTravel #WashingtonDC #Philadelphia #NewYorkCity #EastCoastTravel #CharterBus"}, {"day": 11, "def": "dk", "i": "NYC Day Trips", "b": "NOW BOOKING.", "t": "DC to New York and back. One coach. Zero stress.", "sl": [{"k": "ctx", "l": "THE TRIP", "b": "School groups, senior clubs, and church organizations \u2014 NYC in a day is completely doable from DC/Maryland. You set the time and pickup point. We handle everything else."}, {"k": "pt", "n": "01", "h": "NO A k us for our credentials \u2014 we're proud to share."}], "cap": "Most people have never heard of DOD certification for charter bus companies. Here's why it should matter to you when booking.\n\nThe Department of Defense standards cover safety records, driver qualifications, vehicle condition, and insurance coverage.\n\nAdventure Tours holds this certification.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupSafety #GroupTravel #MotorCoach #WashingtonDC #DMV"}, {"day": 19, "def": "dk", "i": "Raise your hand", "b": "IF YOU'VE BEEN ON A CASINO TRIP.", "t": "Atlantic City hits different on a coach.", "sl": [{"k": "ctx", "l": "THE EXPERIENCE", "b": "There's something about a casino bus trip that just hits different. The energy on the coach before you arrive. Everyone in a good mood."}, {"k": "pt", "n": "01", "h": "THE RIDE IS PART OF THE EXPERIENCE", "b": "Card games, music, good company \u2014 before you've even arrived. Atlantic City is the classic destination, but we've taken groups to plenty of other spots too."}, {"k": "pt", "n": "02", "h": "WE RUN CASINO TRIPS FOR ALL SIZES", "b": "Senior groups, church clubs, community organizations. From 20 to 56 passengers. We've done this route enough times to know every good rest stop."}, {"k": "ta", "p": "There's a reason people book these trips again and again.", "g": "AC"}, {"k": "cl", "h": "Where's your group's next casino trip?", "c": "301-868-1141  |  abdtours.com"}], "cap": "There's something about a casino bus trip that just hits different.\n\nThe energy on the coach before you arrive. Everyone in a good mood. The anticipation building the whole ride there.\n\nAtlantic City is a classic. But we've taken groups to plenty of other destinations too.\n\nWhere would your group go?\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CasinoTrip #AtlanticCity #GroupTravel #CharterBus #SeniorTravel #DMV"}, {"day": 20, "def": "lt", "i": "Corporate Shuttle", "b": "BUILT FOR DC.", "t": "Reli ": "Camps that plan transport early run smoother seasons.", "g": "CAMP"}, {"k": "cl", "h": "Serving camps across the DMV.", "c": "Contact now to lock in summer dates.  |  abdtours.com"}], "cap": "Summer camp season is closer than it looks \u2014 and transportation spots are limited.\n\nIf you run or coordinate a summer camp in the DC/Maryland area, this is the time to lock in your transport.\n\nWe handle daily pickup/drop-off routes, one-time trip days, and full-season contracts.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #SummerCamp #CharterBus #GroupTravel #WashingtonDC #Maryland #DMV"}, {"day": 25, "def": "dk", "i": "We've been moving", "b": "PEOPLE TO MOMENTS.", "t": "Decades of trips. Thousands of miles. One mission.", "sl": [{"k": "ctx", "l": "WHAT THE WORK IS REALLY ABOUT", "b": "Long enough to know that what we're really doing isn't just moving people from one place to another. It's getting a school group to their first Capitol visit."}, {"k": "pt", "n": "01", "h": "FAMILIES ARRIVING TOGETHER, NOT SCATTERED", "b": "Instead of three cars on three different highways. One coach means the trip starts together. The conversation, the anticipation, the arrival \u2014 all shared."}, {"k": "pt", "n": "02", "h": "THAT'S THE WORK. WE DON'T TAKE IT LIGHTLY.", "b": "Every clean bus, every early driver arrival, every careful route choice \u2014 it's in service of the moment at the destination."}, {"k": "ta", "p": "What we do isn't transportation. It's getting people to the moments that matter.", "g": "MOMENTS"}, {"k": "cl", "h": "One call and we'll take it from there.", "c": "301-868-1141  |  abdtours.com"}], "cap": "We've been at this a long time.\n\nLong enough to know that what we're really doing isn't just moving people from one place to another. It's getting a school group to their first Capitol visit. It's giving a senior club a day out they'll be talking about for months.\n\nThat's the work. And we don't take it lightly.\n\n301-868-1141 | abdtours. "}, {"k": "pt", "n": "02", "h": "3. PRINTED ITINERARY.  4. ASK ABOUT ACCESSIBILITY.", "b": "Clear information reduces day-of anxiety. Wheelchair-accessible options are available \u2014 just ask when booking."}, {"k": "ta", "p": "Seniors remember how a trip felt \u2014 not just where they went.", "g": "SENIOR"}, {"k": "cl", "h": "We specialize in senior group travel.", "c": "Comfortable. Reliable. Every time.  |  abdtours.com"}], "cap": "Planning senior group travel well is an art. Here are 5 things experienced coordinators always do.\n\nThe biggest difference between a great senior trip and a stressful one usually comes down to the details.\n\nSave this post and share it with any senior center or church group coordinator you know.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #SeniorTravel #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 28, "def": "lt", "i": "Mini Bus or", "b": "FULL COACH?", "t": "There's a right answer for each group.", "sl": [{"k": "ctx", "l": "THE QUESTION", "b": "It's not just about how many people. Mini buses and full coaches have different strengths \u2014 and the right choice depends on your route, your group, and your destination."}, {"k": "pt", "n": "A", "h": "MINI BUS (20\u201330 SEATS)", "b": "Easier city navigation. Parks almost anywhere. More intimate group feel. Ideal for urban destinations and groups that don't need a restroom onboard."}, {"k": "pt", "n": "B", "h": "FULL COACH (45\u201356 SEATS)", "b": "Restroom onboard. Overhead storage. Reclining seats for longer routes. When you're going DC to NYC or DC to Philly \u2014 this is the one to book."}, {"k": "ta", "p": "Tell us your group size and we'll tell you which makes more sense.", "g": "A/B"}, {"k": "cl", "h": "Drop your headcount in the comments.", "c": "301-868-1141  |  abdtours.com"}], "cap": "Genuine question for our followers \u2014 mini bus or full coach?\n\nIt's not just about passenger count. Mini buses are easier to navigate in cities. Full coaches have restrooms, overhead storage, and more room to stretch out on long routes.\n\nTell us your group size and we'll tell you which one makes more sense.\n\n#AdventureTours #ABDTours #CharterBus #MotorCoach #GroupTravel #BusRental #WashingtonDC #DMV"}, {"day": 29, "def": "dk", "i": "From 14 to 56 seats \u2014", "b": "OUR FLEET.", "t": "Every vehicle. Every trip. Every group size covered.", "sl": [{"k": "ctx", "l": "THE LINEUP", "b": "Not all groups are the same \u2014 so not all coaches should be either. Here's our full fleet, from executive transfers to large-group school coaches."}, {"k": "pt", "n": "01", "h": "TRANSIT \u00b7 MINI-BUS \u00b7 VAN HOOL COACH", "b": "14-passenger Transit for executive transfers. 20\u201325 seat Limo Mini-Bus for premium group events. 25\u201335 seat Van Hool for day trips and community groups."}, {"k": "pt", "n": "02", "h": "MCI FULL COACH (44\u201356 SEATS)", "b": "For schools, sports teams, and large organizations. Restroom. PA system. Overhead storage. Long-haul ready."}, {"k": "ta", "p": "The right coach for every group \u2014 not just the available one.", "g": "FLEET"}, {"k": "cl", "h": "Which size fits your next trip?", "c": "301-868-1141  |  abdtours.com"}], "cap": "Not all groups are the same \u2014 so not all coaches should be either.\n\nAt Adventure Tours, our fleet spans from a 14-passenger Ford Transit all the way up to 56-seat MCI full coaches.\n\nEvery vehicle is maintained to DOD standards, cleaned before every trip, and operated by a professional CDL driver.\n\nWhich size fits your next group?\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #MeetTheFleet #CharterBus #MotorCoach #GroupTravel #WashingtonDC #DMV"}, {"day": 30, "def": "lt", "i": "Spring dates", "b": "ALMOST GONE.", "t": "If your group has been waiting \u2014 this is the week.", "sl": [{"k": "ctx", "l": "THE SITUATION", "b": "Spring availability is going fast. April and May dates are filling quickly. If your group has been putting of var SP=[{"day": 1, "i": "Spring Travel", "b": "IS OPEN.", "s": "School groups, senior clubs & corporate teams.", "c": "Book early. Spring spots fill fast. abdtours.com", "img": "capitol", "cap": "Spring travel season is officially open \u2014 and group spots are going fast.\n\nWhether you're a school coordinator planning a DC field trip, a senior group looking for a comfortable day out, or a company that needs reliable shuttle service \u2014 this is the season to book early.\n\nDOD-certified. Real fleet. Real reliability.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #SchoolTrip #SpringTrip #WashingtonDC #DMV"}, {"day": 2, "i": "DOD-Certified.", "b": "PROFESSIONAL.", "s": "The highest standard in commercial transportation.", "c": "Ask us for our credentials. abdtours.com", "img": "lot", "cap": "Most charter bus companies don't hold DOD certification.\n\nWe do. It means our safety protocols meet federal government requirements.\n\nWhen you book with Adventure Tours, you're booking with a company that government clients trust.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupSafety #DODCertified #MotorCoach #WashingtonDC #DMV"}, {"day": 3, "i": "NYC in a Day", "b": "IS POSSIBLE.", "s": "DC to New York and back. One coach. Zero stress.", "c": "301-868-1141  abdtours.com", "img": "mci_white", "cap": "NYC in a day \u2014 it's completely doable, and more affordable than you think.\n\nWe run DC-to-NYC day trips for school groups, senior clubs, and community organizations.\n\nOne coach. Everyone together. Times Square by lunch.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #NYCDayTrip #CharterBus #GroupTravel #WashingtonDC #Maryland #DMV"}, {"day": 4, "i": "Behind every great trip", "b": "IS A GREAT DRIVER.", "s": "CDL-licensed. Direct employee. DOD-certified.", "c": "Tag a driver who made your trip.", "img": "black_exec", "cap": "The bus might get the attention, but it's the driver that makes the trip.\n\nUp before the group. Ready when everyone else is still half asleep. Navigating city streets, keeping 40+ people comfortable and on time.\n\nOur drivers are professional, experienced, and genuinely good at what they do.\n\n#AdventureTours #ABDTours #DriverAppreciation #CharterBus #GroupTravel #MotorCoach #WashingtonDC #DMV"}, {"day": 5, "i": "Senior Group Travel", "b": "DONE RIGHT.", "s": "Comfortable. Accessible. On time. Every time.", "c": "301-868-1141  abdtours.com", "img": "vanhool", "cap": "Senior group travel should be comfortable, reliable, and genuinely enjoyable \u2014 not stressful.\n\nWe work with senior centers, church groups, and community organizations across the DMV area.\n\nOur coaches are clean, climate-controlled, and designed for comfort. We show up on time, every time.\n\n301-868-1141\n\n#AdventureTours #ABDTours #SeniorTravel #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 6, "i": "The Capitol", "b": "SHOULD BE SEEN IN PERSON.", "s": "No textbook does it justice. We get students there.", "c": "Spring DC trips booking now. abdtours.com", "img": "capitol", "cap": "There's a difference between reading about the Capitol and standing in front of it.\n\nWe've taken school groups to Washington DC more times than we can count. Every single time, there's that moment \u2014 usually at the National Mall \u2014 where it clicks.\n\nSpring DC trips are booking up. Lock in your date now.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #SchoolTrip #WashingtonDC #FieldTrip #DCTravel #CharterBus #Maryland #DMV"}, {"day": 7, "i": "Tag Someone", "b": "WHO NEEDS A GROUP TRIP.", "s": "Atlantic City. NYC. DC. We've got a coach for it.", "c": "Drop their name below.", "img": "black_exec", "cap": "There's always that one person in the group who keeps saying 'we should do a trip' but never actually books it.\n\nTag them.\n\nWhether it's a church group heading to Atlantic City, a senior club planning a NYC day trip, or a school staff retreat \u2014 we've got a coach for it.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #GroupTravel #CharterBus #CasinoTrip #NYCDayTrip #DMV"}, {"day": 8, "i": "Casino Trips.", "b": "HIT DIFFERENT ON A COACH.", "s": "The ride is part of the experience.", "c": "301-868-1141  abdtours.com", "img": "black_minibus", "cap": "There's something about a casino bus trip that just hits different.\n\nThe energy on the coach before you arrive. Everyone in a good mood. The anticipation building the whole ride there.\n\nAtlantic City is a classic. But we've taken groups to plenty of other destinations too.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CasinoTrip #AtlanticCity #GroupTravel #CharterBus #SeniorTravel #DMV"}, {"day": 9, "i": "Corporate Shuttle", "b": "BUILT FOR DC.", "s": "Reliable. Professional. On your schedule.", "c": "Inquire at abdtours.com", "img": "transit", "cap": "Corporate travel in DC demands reliability. There's no margin for a bus that shows up late to a conference.\n\nAdventure Tours provides professional shuttle service for corporate clients across the DMV area.\n\nDOD-certified. Fully insured. Fleet from 14-passenger transits to 56-seat full coaches.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CorporateShuttle #CharterBus #GroupTravel #WashingtonDC #DMV"}, {"day": 10, "i": "Get a Quote", "b": "IN 24 HOURS.", "s": "Group size. Date. Destination. That's all we need.", "c": "301-868-1141  abdtours.com", "img": "vanhool", "cap": "Planning a group trip doesn't have to take weeks.\n\nTell us three things: your group size, your date, and where you're going. We'll come back with the right coach and a clear price \u2014 usually within 24 hours.\n\nVisit abdtours.com or call us directly: 301-868-1141\n\n#AdventureTours #ABDTours #CharterBus #BusRental #GroupTravel #MotorCoach #WashingtonDC #DMV"}, {"day": 11, "i": "From 14 to 56 Seats \u2014", "b": "ONE COMPANY.", "s": "Every vehicle. Every trip. Every group size covered.", "c": "abdtours.com  301-868-1141", "img": "fleet", "cap": "Not all groups are the same \u2014 so not all coaches should be either.\n\nAt Adventure Tours, our fleet spans from a 14-passenger Ford Transit all the way up to 56-seat MCI full coaches.\n\nEvery vehicle is maintained to DOD standards, cleaned before every trip, and operated by a professional CDL driver.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #MeetTheFleet #CharterBus #MotorCoach #GroupTravel #WashingtonDC #DMV"}, {"day": 12, "i": "A Clean Bus", "b": "IS A READY BUS.", "s": "Pre-trip prep happens before every single trip.", "c": "This is the standard. Every time.", "img": "white_mini", "cap": "Before any group boards our coaches, the bus goes through a full prep.\n\nInterior cleaned. Exterior washed. Mechanical systems checked. Fuel topped off. Route reviewed.\n\nThe groups we serve deserve to step onto a vehicle that's been prepared with care.\n\nEvery trip, every time.\n\n#AdventureTours #ABDTours #CharterBus #FleetReady #GroupTravel #MotorCoach #WashingtonDC #DMV"}, {"day": 13, "i": "Spring Break", "b": "GROUP TRIPS.", "s": "Families, school clubs & church groups \u2014 let's go.", "c": "301-868-1141  abdtours.com", "img": "capitol", "cap": "Spring break group trips hit different when you're not dealing with parking, Ubers, and a scattered group.\n\nOne coach. Everyone together. You focus on the experience \u2014 we handle the driving.\n\nWe work with school clubs, church groups, family reunions, and community organizations.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #SpringTrip #SpringBreak #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 14, "i": "The Moment", "b": "THE SKYLINE APPEARS.", "s": "That's when the whole bus goes quiet. Every time.", "c": "What city skyline hit you hardest?", "img": "fleet", "cap": "There's that specific moment \u2014 usually somewhere on the highway \u2014 when the city skyline appears.\n\nAnd the whole bus goes quiet for just a second.\n\nWashington Monument at sunrise. Philly's skyline over the bridge. Manhattan coming into view.\n\nWhich city skyline hit you hardest the first time you saw it?\n\n#AdventureTours #ABDTours #GroupTravel #WashingtonDC #Philadelphia #NewYorkCity #EastCoastTravel #CharterBus"}, {"day": 15, "i": "Summer Camp Transport", "b": "NOW BOOKING.", "s": "Secure your dates before summer fills up.", "c": "abdtours.com  301-868-1141", "img": "lot", "cap": "Summer camp season is closer than it looks \u2014 and transportation spots are limited.\n\nIf you run or coordinate a summer camp in the DC/Maryland area, this is the time to lock in your transport.\n\nWe handle daily pickup/drop-off routes, one-time trip days, and full-season contracts.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #SummerCamp #CharterBus #GroupTravel #WashingtonDC #Maryland #DMV"}, {"day": 16, "i": "Charter Bus", "b": "VS. RENTING VANS.", "s": "After the math \u2014 the charter almost always wins.", "c": "abdtours.com  Run the numbers with us.", "img": "mci_white", "cap": "Most groups think renting vans is the budget option. After doing the math \u2014 it usually isn't.\n\nWhen you split a 40-person group across 7 vans, you're paying for: multiple rentals, fuel, insurance, and multiple drivers.\n\nOne charter coach keeps everyone together, costs less per head, and comes with a professional driver.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #BusRental #MotorCoach #WashingtonDC #DMV"}, {"day": 17, "i": "Mini Bus or", "b": "FULL COACH?", "s": "There's a right answer for every group.", "c": "Drop your group size below.", "img": "fleet", "cap": "Genuine question \u2014 mini bus or full coach?\n\nIt's not just about passenger count. Mini buses are easier to navigate in cities. Full coaches have restrooms, overhead storage, and more room to stretch out on long routes.\n\nTell us your group size and we'll tell you which one makes more sense.\n\n#AdventureTours #ABDTours #CharterBus #MotorCoach #GroupTravel #BusRental #WashingtonDC #DMV"}, {"day": 18, "i": "We've Been", "b": "AT THIS A LONG TIME.", "s": "Real fleet. Real drivers. Real reliability.", "c": "abdtours.com  301-868-1141", "img": "capitol", "cap": "We've been at this a long time.\n\nLong enough to know that what we're really doing isn't just moving people from one place to another. It's getting a school group to their first Capitol visit. It's giving a senior club a day out they'll be talking about for months.\n\nThat's the work. And we don't take it lightly.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 19, "i": "Philadelphia", "b": "IN A DAY.", "s": "DC to Philly and back. One of our favorite routes.", "c": "301-868-1141  abdtours.com", "img": "lot", "cap": "Philadelphia doesn't get enough credit as a day trip destination from DC.\n\nTwo hours on the coach, and you're in one of the most historically rich cities in America. Liberty Bell. Independence Hall. Reading Terminal Market for lunch.\n\nWe've run this route plenty of times. It's one of our favorites.\n\n#AdventureTours #ABDTours #PhiladelphiaTravel #DayTrip #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 20, "i": "Raise Your Hand", "b": "IF YOU'VE DONE A CASINO TRIP.", "s": "Atlantic City on a charter bus is just different.", "c": "Where's your group's next trip?", "img": "black_minibus", "cap": "There's something about a casino bus trip that just hits different.\n\nThe energy on the coach before you arrive. Everyone in a good mood.\n\nAtlantic City is a classic. But we've taken groups to plenty of other destinations too.\n\nWhere would your group go?\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CasinoTrip #AtlanticCity #GroupTravel #CharterBus #SeniorTravel #DMV"}, {"day": 21, "i": "Every Field Trip", "b": "STARTS WITH A BUS.", "s": "And a driver who knows the route by heart.", "c": "Tag a teacher who makes this happen.", "img": "white_mini", "cap": "The first time you see the Washington Monument from the window of a bus \u2014 that's a feeling that stays with you.\n\nWe've been part of thousands of those moments. School groups, families, senior clubs \u2014 all heading somewhere that matters to them.\n\nGroup travel isn't just about getting from A to B. It's about the experience in between.\n\n#AdventureTours #ABDTours #CharterBus #SchoolTrip #FieldTrip #WashingtonDC #GroupTravel #DMV"}, {"day": 22, "i": "We've Been", "b": "MOVING PEOPLE TO MOMENTS.", "s": "Decades of trips. Thousands of miles. One mission.", "c": "abdtours.com  301-868-1141", "img": "mci_white", "cap": "We've been at this a long time.\n\nLong enough to know that what we're really doing isn't just moving people from one place to another.\n\nGetting a school group to their first Capitol visit. Giving a senior club a day out they'll be talking about for months.\n\nThat's the work. And we don't take it lightly.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 23, "i": "Spring Dates", "b": "ALMOST GONE.", "s": "April and May are filling up fast.", "c": "301-868-1141  Call this week.", "img": "lot", "cap": "Spring availability is going fast \u2014 and if your group has been putting off the booking conversation, this is the week.\n\nWe're filling up April and May dates quickly.\n\nOne call. We respond with a quote in 24 hours. You pick your date and we handle everything else.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #MotorCoach #WashingtonDC #DMV #SpringTrip"}, {"day": 24, "i": "The Best NYC Trip", "b": "IS ONE WHERE SOMEONE ELSE DRIVES.", "s": "Times Square by lunch. Back by evening.", "c": "301-868-1141  abdtours.com", "img": "mci_white", "cap": "NYC in a day \u2014 it's completely doable, and more affordable than you think.\n\nWe run DC-to-NYC day trips for school groups, senior clubs, and community organizations.\n\nOne coach. Everyone together. Times Square by lunch.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #NYCDayTrip #CharterBus #GroupTravel #WashingtonDC #Maryland #DMV"}, {"day": 25, "i": "Bus 903", "b": "LOADED & READY.", "s": "Another school group hits the road today.", "c": "Tag a teacher who makes field trips happen.", "img": "vanhool", "cap": "Bus 903 is gassed up, cleaned, and ready to roll.\n\nThere's something special about a school trip morning. The energy. The excitement. Kids seeing the Capitol for the first time \u2014 that never gets old.\n\nWe're proud to serve the schools in Prince George's County and across the DMV.\n\n#AdventureTours #ABDTours #SchoolTrip #FieldTrip #WashingtonDC #Maryland #DMV #CharterBus"}, {"day": 26, "i": "14 to 56 Seats.", "b": "ONE COMPANY.", "s": "We match your group to the exact right coach.", "c": "abdtours.com  301-868-1141", "img": "fleet", "cap": "Not all groups are the same \u2014 so not all coaches should be either.\n\nAt Adventure Tours, our fleet spans from a 14-passenger Ford Transit all the way up to 56-seat MCI full coaches.\n\nEvery vehicle is maintained to DOD standards, cleaned before every trip.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #MeetTheFleet #CharterBus #MotorCoach #GroupTravel #WashingtonDC #DMV"}, {"day": 27, "i": "DOD-Certified.", "b": "GOVERNMENT TRUSTED.", "s": "When federal agencies trust us \u2014 so can you.", "c": "Ask for our credentials. We're proud to share.", "img": "black_exec", "cap": "Most charter bus companies don't hold DOD certification.\n\nWe do. It means our safety protocols meet federal government requirements \u2014 the same standards agencies use when transporting their own personnel.\n\nAdventure Tours is DOD-certified.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #CharterBus #GroupSafety #DODCertified #MotorCoach #WashingtonDC #DMV"}, {"day": 28, "i": "The Ride", "b": "IS PART OF THE TRIP.", "s": "Community. Conversation. Arrival together.", "c": "abdtours.com  301-868-1141", "img": "fleet", "cap": "There's something about arriving somewhere together that's different from arriving separately.\n\nThe conversation on the way there. The shared anticipation. Everyone pulling into the destination at the same moment.\n\nGroup travel isn't just about the destination. It's about the group staying a group \u2014 start to finish.\n\n301-868-1141 | abdtours.com\n\n#AdventureTours #ABDTours #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 29, "i": "Senior Groups.", "b": "WE PLAN AHEAD FOR YOU.", "s": "Accessible boarding. Extra time at stops. No rush.", "c": "301-868-1141  abdtours.com", "img": "vanhool", "cap": "Senior group travel should be comfortable, reliable, and genuinely enjoyable \u2014 not stressful.\n\nWe work with senior centers, church groups, and community organizations across the DMV area.\n\nOur coaches are clean, climate-controlled, and designed for comfort.\n\n301-868-1141\n\n#AdventureTours #ABDTours #SeniorTravel #GroupTravel #CharterBus #MotorCoach #WashingtonDC #DMV"}, {"day": 30, "i": "One Call.", "b": "SECURED DATE.", "s": "Everything handled. Start to finish.", "c": "301-868-1141  abdtours.com  Accokeek MD", "img": "capitol", "cap": "Spring availability is going fast \u2014 and if your group has been putting off the booking conversation, this is the week.\n\nOne call. We respond with a quote in 24 hours. You pick your date and we handle everything else.\n\n301-868-1141\nabdtours.com\nAccokeek, MD\n\n#AdventureTours #ABDTours #CharterBus #GroupTravel #MotorCoach #WashingtonDC #Maryland #DMV #SpringTrip"}];

var curC=0,curS=0,curPal=null,curSP=0;

function G(c){return curPal||c.def;}
function pad(n){return n<10?'0'+n:''+n;}
function mkGrid(p){
  var col=p==='dk'?'rgba(255,255,255,.022)':'rgba(0,0,0,.04)',s='';
  for(var i=0;i<=540;i+=54)s+='<line x1="'+i+'" y1="0" x2="'+i+'" y2="540" stroke="'+col+'" stroke-width="0.5"/><line x1="0" y1="'+i+'" x2="540" y2="'+i+'" stroke="'+col+'" stroke-width="0.5"/>';
  return '<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;" viewBox="0 0 540 540" fill="none">'+s+'</svg>';
}
function mkCorner(p){
  var col=p==='dk'?'rgba(255,255,255,.1)':'rgba(0,0,0,.1)';
  return '<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;" viewBox="0 0 540 540" fill="none"><path d="M44 90L44 44L90 44" stroke="'+col+'" stroke-width="2"/><path d="M496 450L496 496L450 496" stroke="'+col+'" stroke-width="2"/></svg>';
}

/* --- CAROUSEL RENDERING --- */
function cover(c){
  var p=G(c),d=pad(c.day);
  var iL=c.i.length,bL=c.b.length;
  var iF=iL>20?40:iL>14?50:62,bF=bL>18?50:bL>12?62:78;
  var imgKey=CM[(c.day-1)%CM.length];
  var imgSrc=B[imgKey]||'';
  var bgStyle=imgSrc?'background-image:url('+imgSrc+');background-size:cover;background-position:center;':'background:#0A0A0A;';
  return '<div class="slide dk s-cover on" style="'+bgStyle+'">'
    +'<div class="cvov"></div>'
    +mkGrid('dk')
    +'<div class="cvbrand">abdtours.com</div>'
    +'<div class="cvnum bgn">'+d+'</div>'
    +'<div class="cvmid">'
      +'<div class="cvi" style="font-size:'+iF+'px;">'+c.i+'</div>'
      +'<div class="cvb" style="font-size:'+bF+'px;">'+c.b+'</div>'
      +'<div class="cvstripe"></div>'
      +'<div class="cvtag">'+c.t+'</div>'
    +'</div>'
    +'<div class="cvbot"><span style="font-family:Roboto Mono,monospace;font-size:9px;letter-spacing:.12em;color:#5A4E38;position:relative;z-index:3;">DAY '+d+' / 30</span></div>'
    +'</div>';
}
function csli(c,sl,idx,tot){
  var p=G(c),n=idx+1;
  if(sl.k==='ctx')return '<div class="slide '+p+' s-int"><div class="isn tm">'+n+'/'+tot+'</div><div class="ibh">abdtours.com</div><span class="ilbl tm">'+sl.l+'</span><p class="ibody ts">'+sl.b+'</p></div>';
  if(sl.k==='pt'){
    var hL=sl.h.length,hF=hL>30?17:hL>22?20:23;
    return '<div class="slide '+p+' s-int"><div class="isn tm">'+n+'/'+tot+'</div><div class="ibh">abdtours.com</div><div class="ibgn bgn">'+sl.n+'</div><div class="ibar"></div><div class="ihead tp" style="font-size:'+hF+'px;">'+sl.h+'</div><p class="ibody ts" style="font-size:14px;">'+sl.b+'</p></div>';
  }
  if(sl.k==='ta')return '<div class="slide '+p+' s-int"><div class="isn tm">'+n+'/'+tot+'</div><div class="ibh">abdtours.com</div><div class="ibgn bgn" style="font-size:110px;">'+sl.g+'</div><div class="ibar"></div><p class="iprin tp">'+sl.p+'</p></div>';
  if(sl.k==='cl')return '<div class="slide '+p+' s-close">'+mkCorner(p)+'<span class="iclbl tm">Get in Touch</span><p class="ichl tp">'+sl.h+'</p><div class="icgold"></div><span class="icphone">301-868-1141</span><span class="icweb ts">abdtours.com</span><p class="iccta ts">'+sl.c+'</p><div class="icbrand">Adventure Tours</div></div>';
  return '';
}
function buildAll(c){
  var tot=c.sl.length+1,html=cover(c);
  c.sl.forEach(function(sl,i){html+=csli(c,sl,i+1,tot);});
  return html;
}

/* --- STATIC POST RENDERING --- */
function buildSP(sp){
  var imgSrc=B[sp.img]||'';
  var iL=sp.i.length,bL=sp.b.length;
  var iF=iL>22?42:iL>16?52:64,bF=bL>20?50:bL>14?62:78;
  var d=pad(sp.day);
  return '<div class="spost on" style="'
    +'width:100%;height:100%;position:relative;overflow:hidden;'
    +(imgSrc?'background-image:url('+imgSrc+');background-size:cover;background-position:center;':'background:#0A0A0A;')
    +'">'
    // Gradient overlay
    +'<div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,.7) 40%,rgba(0,0,0,.92) 100%);z-index:1;pointer-events:none;"></div>'
    // Grid
    +'<svg style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;" viewBox="0 0 540 540" fill="none">'
    +Array.from({length:11},function(_,i){var x=i*54;return '<line x1="'+x+'" y1="0" x2="'+x+'" y2="540" stroke="rgba(255,255,255,.018)" stroke-width="0.5"/><line x1="0" y1="'+x+'" x2="540" y2="'+x+'" stroke="rgba(255,255,255,.018)" stroke-width="0.5"/>';}).join('')
    +'</svg>'
    // Corner brackets
    +'<svg style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;" viewBox="0 0 540 540" fill="none">'
    +'<path d="M44 90L44 44L90 44" stroke="rgba(184,149,42,.55)" stroke-width="2.5"/>'
    +'<path d="M496 450L496 496L450 496" stroke="rgba(184,149,42,.55)" stroke-width="2.5"/>'
    +'</svg>'
    // Bottom gold stripe
    +'<div style="position:absolute;bottom:110px;left:0;right:0;height:3px;background:#B8952A;z-index:4;"></div>'
    // Day tag top right
    +'<div style="position:absolute;top:36px;right:36px;font-family:Roboto Mono,monospace;font-size:9px;letter-spacing:.15em;color:rgba(90,78,56,.7);z-index:5;">DAY '+d+' / 30</div>'
    // Main content
    +'<div style="position:absolute;left:36px;right:36px;bottom:124px;z-index:5;">'
      +'<div style="font-family:Playfair Display,serif;font-style:italic;font-weight:900;font-size:'+iF+'px;line-height:.93;letter-spacing:-.02em;color:#F5F0E8;margin-bottom:6px;">'+sp.i+'</div>'
      +'<div style="font-family:Poppins,sans-serif;font-weight:900;font-size:'+bF+'px;line-height:.88;letter-spacing:-.02em;text-transform:uppercase;color:#D4AF4F;margin-bottom:18px;">'+sp.b+'</div>'
      +'<div style="width:60px;height:3px;background:#B8952A;margin-bottom:14px;"></div>'
      +'<div style="font-family:Poppins,sans-serif;font-size:17px;font-weight:500;color:rgba(196,180,154,.92);line-height:1.5;margin-bottom:10px;">'+sp.s+'</div>'
      +'<div style="font-family:Roboto Mono,monospace;font-size:13px;color:rgba(100,88,62,.85);letter-spacing:.04em;">'+sp.c+'</div>'
    +'</div>'
    // Logo bottom left
    +'<div style="position:absolute;bottom:18px;left:36px;z-index:5;">'
      +'<div style="font-family:Roboto Mono,monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#B8952A;font-weight:700;">ADVENTURE TOURS</div>'
      +'<div style="width:60px;height:2px;background:#B8952A;margin-top:4px;"></div>'
    +'</div>'
    +'</div>';
}

function buildIndex(){
  var cg=document.getElementById('cgrid');
  cg.innerHTML=D.map(function(c,i){
    var imgKey=CM[i],imgSrc=B[imgKey]||'',d=pad(c.day);
    return '<div class="card" onclick="openC('+i+')">'
      +'<div class="card-thumb" style="'+(imgSrc?'background-image:url('+imgSrc+')':'background:#1a1208')+';"></div>'
      +'<div class="card-body">'
        +'<div class="c-day">CAROUSEL '+d+' / 30</div>'
        +'<div class="c-hl">'+c.i+' '+c.b+'</div>'
        +'<div class="c-sub">'+c.t+'</div>'
      +'</div></div>';
  }).join('');
  var sg=document.getElementById('sgrid');

      +'<div class="card-body">'
        +'<div class="c-day">STATIC '+d+' / 30</div>'

}

/* --- CAROUSEL VIEWER --- */
function openC(i){
  curC=i;curS=0;curPal=null;
  var c=D[i];
  document.getElementById('idx').style.display='none';
  document.getElementById('svwr').style.display='none';
  document.getElementById('vwr').style.display='flex';
  document.getElementById('vday').textContent='CAROUSEL '+pad(c.day)+' / 30';
  document.getElementById('vtit').textContent=c.i+' '+c.b;
  document.getElementById('pdk').classList.toggle('on',c.def==='dk');
  document.getElementById('plt').classList.toggle('on',c.def==='lt');
  document.getElementById('sw').innerHTML=buildAll(c);
  mkDots('dots',c.sl.length+1,curS,function(n){goTo(n);});
  syncC();
  document.getElementById('captxt').textContent=c.cap||'';
  updFn();
}
function setPal(p){
  curPal=p;
  document.getElementById('pdk').classList.toggle('on',p==='dk');
  document.getElementById('plt').classList.toggle('on',p==='lt');
  var s=curS;openC(curC);curPal=p;goTo(s);
}
function goTo(n){
  var slides=document.getElementById('sw').querySelectorAll('.slide');
  n=Math.max(0,Math.min(n,slides.length-1));
  slides.forEach(function(s,i){s.style.display=i===n?'flex':'none';s.classList.toggle('on',i===n);});
  curS=n;syncDots('dots',n);syncC();updFn();
}
function nextS(){goTo(curS+1);}function prevS(){goTo(curS-1);}
function syncC(){
  var tot=D[curC].sl.length+1;
  document.getElementById('bp').disabled=curS===0;
  document.getElementById('bn').disabled=curS>=tot-1;
  document.getElementById('cpb').disabled=curC===0;
  document.getElementById('cnb').disabled=curC===D.length-1;
  document.getElementById('cct').textContent=(curC+1)+' / '+D.length;
}
function prevC(){if(curC>0)openC(curC-1);}
function nextC(){if(curC<D.length-1)openC(curC+1);}

/* --- STATIC POST VIEWER --- */
function openSP(i){
  curSP=i;
  var sp=SP[i];
  document.getElementById('idx').style.display='none';
  document.getElementById('vwr').style.display='none';
  document.getElementById('svwr').style.display='flex';
  document.getElementById('svday').textContent='STATIC '+pad(sp.day)+' / 30';
  document.getElementById('svtit').textContent=sp.i+' '+sp.b;
  document.getElementById('sw2').innerHTML=buildSP(sp);
  mkDots('sdots',SP.length,curSP,function(n){openSP(n);});
  syncSP();
  document.getElementById('scaptxt').textContent=sp.cap||'';
  updSFn();
}
function prevSP(){if(curSP>0)openSP(curSP-1);}
function nextSP(){if(curSP<SP.length-1)openSP(curSP+1);}
function syncSP(){
  document.getElementById('sbp').disabled=curSP===0;
  document.getElementById('sbn').disabled=curSP>=SP.length-1;
}

/* --- DOTS HELPER --- */
function mkDots(id,n,cur,fn){
  document.getElementById(id).innerHTML=Array.from({length:n},function(_,i){
    return '<div class="dot'+(i===cur?' on':'')+'" onclick="('+fn+')('+i+')"></div>';
  }).join('');
}
function syncDots(id,cur){
  document.querySelectorAll('#'+id+' .dot').forEach(function(d,i){d.classList.toggle('on',i===cur);});
}

/* --- SHARED --- */
function showIdx(){
  document.getElementById('idx').style.display='block';
  document.getElementById('vwr').style.display='none';
  document.getElementById('svwr').style.display='none';
  curPal=null;
}
function copyCap(){cpToClip('captxt','capok');}
function copyScap(){cpToClip('scaptxt','scapok');}
function cpToClip(src,ok){
  navigator.clipboard.writeText(document.getElementById(src).textContent).then(function(){
    var el=document.getElementById(ok);el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2200);
  });
}
function updFn(){
  var c=D[curC],d=pad(c.day);
  document.getElementById('imgfn').textContent='abdtours_carousel_day'+d+'_slide'+(curS+1)+'.png';
}
function updSFn(){
  var sp=SP[curSP],d=pad(sp.day);
  document.getElementById('simgfn').textContent='abdtours_static_day'+d+'.png';
}
function showFb(id,msg){
  var el=document.getElementById(id);el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}
async function capEl(el){
  await document.fonts.ready;
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:0;width:540px;height:540px;overflow:hidden;z-index:-1;';
  var clone=el.cloneNode(true);
  clone.style.cssText='display:block!important;position:relative!important;width:540px!important;height:540px!important;overflow:hidden!important;';
  wrap.appendChild(clone);document.body.appendChild(wrap);
  await new Promise(function(r){setTimeout(r,200);});
  var canvas;
  try{canvas=await html2canvas(clone,{width:540,height:540,scale:2,useCORS:true,allowTaint:true,logging:false,removeContainer:true});}
  finally{if(document.body.contains(wrap))document.body.removeChild(wrap);}
  return canvas;
}
function dlCanvas(canvas,fname){
  var a=document.createElement('a');a.download=fname;a.href=canvas.toDataURL('image/png');
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
async function copyImg(){
  var btn=document.getElementById('bci');btn.disabled=true;btn.textContent='Rendering...';
  try{
    var active=document.getElementById('sw').querySelector('.slide.on');
    if(!active){btn.disabled=false;btn.textContent='Copy Image';return;}
    var c=await capEl(active);
    if(window.ClipboardItem){try{var blob=await new Promise(function(r){c.toBlob(r,'image/png');});await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);showFb('imgfb','Copied');btn.disabled=false;btn.textContent='Copy Image';return;}catch(e){}}
    dlCanvas(c,document.getElementById('imgfn').textContent);showFb('imgfb','Saved');
  }catch(e){showFb('imgfb','Error');}
  btn.disabled=false;btn.textContent='Copy Image';
}
async function dlImg(){
  var btn=document.getElementById('bdl');btn.disabled=true;btn.textContent='Rendering...';
  try{var active=document.getElementById('sw').querySelector('.slide.on');if(active){var c=await capEl(active);if(c){dlCanvas(c,document.getElementById('imgfn').textContent);showFb('imgfb','Downloaded');}}}catch(e){showFb('imgfb','Error');}
  btn.disabled=false;btn.textContent='Download';
}
async function copySI(){

    dlCanvas(c,document.getElementById('simgfn').textContent);showFb('simgfb','Saved');

  btn.disabled=false;btn.textContent='Copy Image';
}
async function dlSI(){
  var btn=document.getElementById('sbdl');btn.disabled=true;btn.textContent='Rendering...';
  try{var active=document.getElementById('sw2').querySelector('.spost.on');if(active){var c=await capEl(active);if(c){dlCanvas(c,document.getElementById('simgfn').textContent);showFb('simgfb','Downloaded');}}}catch(e){showFb('simgfb','Error');}
  btn.disabled=false;btn.textContent='Download';
}
document.addEventListener('keydown',function(e){
  if(document.getElementById('vwr').style.display==='flex'){
    if(e.key==='ArrowRight')nextS();if(e.key==='ArrowLeft')prevS();if(e.key==='Escape')showIdx();
  }
  if(document.getElementById('svwr').style.display==='flex'){
    if(e.key==='ArrowRight')nextSP();if(e.key==='ArrowLeft')prevSP();if(e.key==='Escape')showIdx();
  }
});
buildIndex();
</script>
